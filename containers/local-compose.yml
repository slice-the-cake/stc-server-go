version: '3.9'

services:

  db:
    image: docker.io/library/postgres
    restart: always
    env_file:
      - ../.env
    volumes:
      - $PWD/database/data:/var/lib/postgresql:Z,U
    ports:
      - "5432:5432"

  server:
    build:
      context: ..
      dockerfile: containers/Containerfile.server
    restart: always
    depends_on:
      - db
    ports:
      - "8080:8090"
    environment:
      DB_URL: postgres://postgres:${PG_PASSWORD}@db:5432/postgres
